name: Auto deploy

on: push

jobs:
  pull-and-deploy-job:
    name: Pull from github and deploy
    runs-on: ["self-hosted", "linux", "x64"]
    steps:
      - name: pull-latest-code
        run: |
          cd /home/butfor/butfor-www/
          git pull

      - name: install-packages
        run: |
          cd /home/butfor/butfor-www/
          yarn install

      - name: build
        run: |
          cd /home/butfor/butfor-www/
          yarn build
